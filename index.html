    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #2b2b2b;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            user-select: none; touch-action: none;
        }

        #gameContainer {
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

        #loadingScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #87CEEB;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center; gap: 14px;
        }
        #loadingScreen .ld-title { font-size: 42px; font-weight: 700; color: white; letter-spacing: 3px; text-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        #loadingScreen .ld-sub   { font-size: 18px; color: rgba(255,255,255,0.85); }
        .loader-bg  { width: 180px; height: 10px; background: rgba(255,255,255,0.35); border-radius: 5px; }
        .loader-bar { height: 100%; background: white; border-radius: 5px; width: 0%; transition: width 0.25s ease; }

        /* ── On-screen mobile buttons ── */
        #controls {
            position: absolute; bottom: 48px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 18px;
            pointer-events: none; z-index: 10;
        }
        .ctrl-btn {
            width: 72px; height: 72px; border-radius: 50%;
            background: rgba(255,255,255,0.22);
            border: 2px solid rgba(255,255,255,0.45);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white; pointer-events: all;
            cursor: pointer; transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active { background: rgba(255,255,255,0.45); }

        /* ── HUD buttons (sound / pause) ── */
        #hud {
            position: absolute; top: 10px; right: 10px;
            display: flex; gap: 8px; z-index: 10;
        }
        .hud-btn {
            width: 38px; height: 38px; border-radius: 8px;
            background: rgba(255,255,255,0.22);
            border: 2px solid rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: white; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .hud-btn:active { background: rgba(255,255,255,0.45); }

        /* ── Pause overlay ── */
        #pauseOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 15; gap: 18px;
        }
        #pauseOverlay .p-title { font-size: 40px; color: white; font-weight: 700; }
        #pauseOverlay .p-btn {
            padding: 12px 40px; border-radius: 30px;
            background: white; color: #333; font-size: 20px;
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            border: none; cursor: pointer;

</div>

const GAME_WIDTH  = 400;
const GAME_HEIGHT = 700;

const canvas    = document.getElementById('gameCanvas');

const container = document.getElementById('gameContainer');
canvas.width  = GAME_WIDTH;
canvas.height = GAME_HEIGHT;

function resize() {
    const scale = Math.min(window.innerWidth / GAME_WIDTH, window.innerHeight / GAME_HEIGHT);
    container.style.width  = `${GAME_WIDTH  * scale}px`;
    container.style.height = `${GAME_HEIGHT * scale}px`;
}
window.addEventListener('resize', resize);
resize();

// ─── AUDIO ───
let audioCtx  = null;
let soundOn   = true;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playTone(type, freq, dur, vol = 0.25) {
    if (!soundOn || !audioCtx) return;
    try {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = type;
        o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + dur);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.start(); o.stop(audioCtx.currentTime + dur);
    } catch(e){}
}

};

}
function onErr() { useImageFallback = true; startGame(); }

// ─── STATE ───
const GS = { START: 0, PLAYING: 1, FREEZE: 2, DEAD: 3, PAUSED: 4 };
let state      = GS.START;
let lastTime   = 0;
let score      = 0;
let dispScore  = 0;   // smooth animated score
let highScore  = parseInt(localStorage.getItem('bouncxHS') || '0');
let isNewBest  = false;
let newBestTimer = 0;
let shakeAmt   = 0;
let lastAdAt   = 0;

// ─── INPUT ───
const Input = { left: false, right: false };
window.addEventListener('keydown', e => {
    if (e.key.toLowerCase()==='a'||e.key==='ArrowLeft')  Input.left  = true;
    if (e.key.toLowerCase()==='d'||e.key==='ArrowRight') Input.right = true;
    if (e.key==='Escape'||e.key==='p') togglePause();
});
window.addEventListener('keyup', e => {
    if (e.key.toLowerCase()==='a'||e.key==='ArrowLeft')  Input.left  = false;
    if (e.key.toLowerCase()==='d'||e.key==='ArrowRight') Input.right = false;
});

// Mobile arrow buttons
const leftBtn  = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
leftBtn.addEventListener('touchstart',  e=>{ e.preventDefault(); initAudio(); Input.left=true;  }, {passive:false});
leftBtn.addEventListener('touchend',    e=>{ e.preventDefault(); Input.left=false; },             {passive:false});
rightBtn.addEventListener('touchstart', e=>{ e.preventDefault(); initAudio(); Input.right=true; }, {passive:false});
rightBtn.addEventListener('touchend',   e=>{ e.preventDefault(); Input.right=false; },            {passive:false});
leftBtn.addEventListener('mousedown',  ()=>{ initAudio(); Input.left=true;  });
leftBtn.addEventListener('mouseup',    ()=>{ Input.left=false;  });
rightBtn.addEventListener('mousedown', ()=>{ initAudio(); Input.right=true; });
rightBtn.addEventListener('mouseup',   ()=>{ Input.right=false; });

// Tap canvas to start/restart
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); initAudio(); handleCanvasTap(); }, {passive:false});
canvas.addEventListener('mousedown',  ()=>{ initAudio(); handleCanvasTap(); });
function handleCanvasTap() {
    if (state === GS.START || state === GS.DEAD) RestartSystem.reset();
}

// Sound toggle
const soundBtn = document.getElementById('soundBtn');
soundBtn.addEventListener('click', () => {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
});

// Pause
const pauseBtn     = document.getElementById('pauseBtn');
const pauseOverlay = document.getElementById('pauseOverlay');
const resumeBtn    = document.getElementById('resumeBtn');
pauseBtn.addEventListener('click', togglePause);
resumeBtn.addEventListener('click', togglePause);

function togglePause() {
    if (state === GS.PLAYING) {
        state = GS.PAUSED;
        pauseOverlay.style.display = 'flex';
        PokiSDK.gameplayStop();
    } else if (state === GS.PAUSED) {
        state = GS.PLAYING;
        pauseOverlay.style.display = 'none';
        lastTime = performance.now();
        PokiSDK.gameplayStart();
    }
}

// Show/hide controls only during play
function setControlsVisible(v) {
    document.getElementById('controls').style.opacity = v ? '1' : '0';
    document.getElementById('hud').style.opacity      = v ? '1' : '0';
}
setControlsVisible(false);

// ─── CLOUDS (parallax background) ───
const Clouds = {
    list: [],
    init() {
        this.list = [];
        for (let i = 0; i < 7; i++) this.list.push(this.make(Math.random() * GAME_HEIGHT));
    },
    make(y) {
        return { x: Math.random() * GAME_WIDTH, y, w: 60 + Math.random() * 70, speed: 12 + Math.random() * 18, alpha: 0.12 + Math.random() * 0.18 };
    },
    update(dt, scroll) {
        this.list.forEach(c => {
            c.y += scroll * 0.35 + c.speed * dt;
            if (c.y > GAME_HEIGHT + 60) { Object.assign(c, this.make(-60)); c.y = -60; }
        });
    },
    draw(ctx) {
        // Sky gradient
        const g = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
        g.addColorStop(0,   '#87CEEB');
        g.addColorStop(1,   '#c9e8f5');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        this.list.forEach(c => {
            ctx.save();
            ctx.globalAlpha = c.alpha;
            ctx.fillStyle = 'white';
            const draw = (ox, oy, rx, ry) => { ctx.beginPath(); ctx.ellipse(c.x+ox, c.y+oy, rx, ry, 0, 0, Math.PI*2); ctx.fill(); };
            draw(0,    0,  c.w/2,  c.w/4);
            draw(-c.w*0.22, 6,  c.w*0.3,  c.w*0.18);
            draw( c.w*0.22, 6,  c.w*0.32, c.w*0.2);
            ctx.restore();
        });
    }
};

// ─── PARTICLES ───
const Particles = {
    list: [],
    add(p) { this.list.push(p); },
    spawnBreak(x, y, w) {
        for (let i = 0; i < 16; i++) {
            this.add({ x: x + Math.random()*w, y, vx:(Math.random()-0.5)*280, vy:(Math.random()-1.4)*220,
                size:4+Math.random()*6, life:1, col: Math.random()>.5 ? '#c8a97e':'#8B6347', gravity:420, type:'sq' });
        }
    },
    spawnBounce(x, y) {
        for (let i = 0; i < 7; i++) {
            const a = Math.PI + (Math.PI/6)*i;
            this.add({ x, y, vx:Math.cos(a)*70, vy:Math.sin(a)*70, size:3.5, life:0.55, col:'rgba(255,255,255,0.75)', gravity:0, type:'ci' });
        }
    },
    spawnScore(x, y, txt) {
        this.add({ x, y, vx:(Math.random()-0.5)*25, vy:-110, size:20, life:0.95, startLife:0.95, col:'#fff', gravity:0, type:'tx', txt });
    },
    spawnDeath(x, y) {
        for (let i = 0; i < 22; i++) {
            const a = (Math.PI*2/22)*i;
            this.add({ x, y, vx:Math.cos(a)*(80+Math.random()*180), vy:Math.sin(a)*(80+Math.random()*180),
                size:4+Math.random()*8, life:1.1, col:'#E74C3C', gravity:350, type:'ci' });
        }
    },
    spawnNewBest(cx) {
        for (let i = 0; i < 30; i++) {
            this.add({ x: cx + (Math.random()-0.5)*GAME_WIDTH*0.7, y: 80,
                vx:(Math.random()-0.5)*200, vy:-(50+Math.random()*200),
                size:5+Math.random()*7, life:1.4,
                col:['#FFD700','#FFA500','#FF6347','#fff'][Math.floor(Math.random()*4)],
                gravity:200, type:'ci' });
        }
    },
    update(dt) {
        for (let i = this.list.length-1; i>=0; i--) {
            const p = this.list[i];
            p.x += p.vx*dt; p.y += p.vy*dt; p.vy += (p.gravity||0)*dt;
            p.life -= dt * (p.type==='tx' ? 1.0 : 1.6);
            if (p.life <= 0) this.list.splice(i, 1);
        }
    },
    draw(ctx) {
        this.list.forEach(p => {
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.type==='tx' ? p.life/(p.startLife||0.95) : p.life * 0.9);
            if (p.type==='sq') {
                ctx.fillStyle = p.col; ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
            } else if (p.type==='ci') {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = p.col; ctx.fill();
            } else if (p.type==='tx') {
                ctx.font = `bold ${p.size}px Quicksand, sans-serif`;
                ctx.fillStyle = p.col; ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 3;
                ctx.fillText(p.txt, p.x, p.y);
            }
            ctx.restore();
        });
    }
};

// ─── TRAIL ───
const Trail = {
    pts: [],
    add(x,y) { this.pts.unshift({x,y}); if(this.pts.length>10) this.pts.pop(); },
    draw(ctx, r) {
        this.pts.forEach((p,i) => {
            ctx.save();
            ctx.globalAlpha = (1-i/this.pts.length)*0.35;
            ctx.beginPath(); ctx.arc(p.x, p.y, r*(1-i/this.pts.length)*0.85, 0, Math.PI*2);
            ctx.fillStyle = '#E74C3C'; ctx.fill();
            ctx.restore();
        });
    },
    clear() { this.pts = []; }
};

// ─── PLAYER ───
const Player = {
    x:0, y:0, vy:0, radius:18,
    speed:350, jumpPower:-650, gravity:1200,
    squish:1, squishV:0,  // squish animation
    init() { this.x=GAME_WIDTH/2; this.y=GAME_HEIGHT/2; this.vy=0; this.squish=1; Trail.clear(); },
    doSquish() { this.squish=0.55; this.squishV=8; },
    update(dt) {
        if (Input.left)  this.x -= this.speed*dt;
        if (Input.right) this.x += this.speed*dt;
        if (this.x+this.radius < 0)          this.x = GAME_WIDTH+this.radius;
        else if (this.x-this.radius > GAME_WIDTH) this.x = -this.radius;
        this.vy += this.gravity*dt; this.y += this.vy*dt;
        if (Math.abs(this.vy)>100) Trail.add(this.x, this.y);
        // spring squish back to 1
        this.squishV += (1 - this.squish) * 30;
        this.squishV *= 0.7;
        this.squish  += this.squishV * dt;
        this.squish   = Math.max(0.5, Math.min(1.4, this.squish));
    },
    draw(ctx) {
        Trail.draw(ctx, this.radius);
        const sx = 2-this.squish;  // horizontal stretch when squished vertically
        const sy = this.squish;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(sx, sy);
        if (useImageFallback) {
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2);
            ctx.fillStyle='#E74C3C'; ctx.fill();
        } else {
            const d = this.radius*2;
            ctx.drawImage(images.player, -this.radius, -this.radius, d, d);
        }
        ctx.restore();
    }
};

// ─── PLATFORMS ───
const Platforms = {
    list: [], highY: 0,
    init() {
        this.list = []; this.highY = GAME_HEIGHT-100;
        this.list.push({x:GAME_WIDTH/2-50, y:this.highY, w:100, h:16, type:'normal', bounces:-1, breakAnim:0});
        this.spawnTo(-500);
    },
    spawnTo(target) {
        while (this.highY > target) {
            const gap  = 80 + Math.random()*60;
            this.highY -= gap;
            const w    = 65 + Math.random()*40;
            const x    = Math.random()*(GAME_WIDTH-w);
            const weak = score > 4 && Math.random() > 0.68;
            this.list.push({x, y:this.highY, w, h:16, type:weak?'weak':'normal', bounces:weak?2:-1, breakAnim:0});
        }
    },
    update(dt, scroll) {
        const cam   = (Player.y<GAME_HEIGHT/2 && Player.vy<0) ? -Player.vy*dt : 0;
        const total = scroll*dt + cam;
        Player.y += total;
        Clouds.update(dt, total);
        for (let i=this.list.length-1; i>=0; i--) {
            const p = this.list[i];
            p.y += total;
            if (p.breakAnim>0) { p.breakAnim += dt*5; }
            if (p.y > GAME_HEIGHT+60 || p.breakAnim>1) this.list.splice(i,1);
        }
        this.highY += total;
        this.spawnTo(-120);
    },
    draw(ctx) {
        this.list.forEach(p => {
            ctx.save();
            if (p.breakAnim>0) {
                ctx.globalAlpha = 1-p.breakAnim;
                ctx.translate(p.x+p.w/2, p.y+p.h/2);
                ctx.rotate(p.breakAnim*0.4);
                ctx.scale(1+p.breakAnim*0.2, 1-p.breakAnim*0.5);
                ctx.translate(-(p.x+p.w/2), -(p.y+p.h/2));
            }
            if (useImageFallback) {
                ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(p.x+2,p.y+4,p.w,p.h);
                ctx.fillStyle = p.type==='normal'?'#8B6347':'#D4AC0D'; ctx.fillRect(p.x,p.y,p.w,p.h);
                ctx.fillStyle = p.type==='normal'?'#a07855':'#f0c030'; ctx.fillRect(p.x,p.y,p.w,3);
            } else {
                ctx.shadowColor='rgba(0,0,0,0.2)'; ctx.shadowBlur=5; ctx.shadowOffsetY=3;
                ctx.drawImage(p.type==='normal'?images.platform:images.platformWeak, p.x, p.y, p.w, p.h);
            }
            ctx.restore();
        });
    }
};

// ─── DANGER ZONE ───
const DangerZone = {
    draw(ctx) {
        const y = GAME_HEIGHT-30;
        ctx.fillStyle='#333'; ctx.fillRect(0,y,GAME_WIDTH,30);
        ctx.fillStyle='#555'; ctx.beginPath();
        for (let x=0; x<GAME_WIDTH; x+=16) { ctx.moveTo(x,y+1); ctx.lineTo(x+8,y-16); ctx.lineTo(x+16,y+1); }
        ctx.fill();
        ctx.fillStyle='#777'; ctx.beginPath();
        for (let x=0; x<GAME_WIDTH; x+=16) { ctx.moveTo(x+8,y-16); ctx.lineTo(x+11,y+1); ctx.lineTo(x+8,y-11); }
        ctx.fill();
    }
};

// ─── COLLISION ───
const Collision = {
    check() {
        if (Player.y+Player.radius > GAME_HEIGHT-30) return 'death';
        if (Player.vy>0) {
            for (const p of Platforms.list) {
                if (p.breakAnim>0) continue;
                const inX    = Player.x+Player.radius*0.5>p.x && Player.x-Player.radius*0.5<p.x+p.w;
                const prevB  = Player.y+Player.radius - Player.vy*(1/60);
                const lands  = Player.y+Player.radius>=p.y && prevB<=p.y+p.h;
                if (inX && lands) { Player.y=p.y-Player.radius; return p; }
            }
        }
        return null;
    }
};

// ─── RESTART ───
const RestartSystem = {
    reset() {
        Player.init(); Platforms.init(); Clouds.init(); Particles.list=[];
        score=0; dispScore=0; lastAdAt=0; isNewBest=false; newBestTimer=0;
        Input.left=false; Input.right=false;
        state=GS.PLAYING;
        setControlsVisible(true);
        PokiSDK.gameplayStart();
    },
    death() {
        state=GS.FREEZE; shakeAmt=18;
        SFX.death();
        Particles.spawnDeath(Player.x, Player.y);
        PokiSDK.gameplayStop();
        // commercial break on death — required by Poki
        PokiSDK.commercialBreak(() => { lastTime = performance.now(); });
        setTimeout(() => {
            state=GS.DEAD;
            if (score>highScore) {
                isNewBest=true; newBestTimer=3;
                highScore=score;
                localStorage.setItem('bouncxHS', highScore);
                SFX.newBest();
                Particles.spawnNewBest(GAME_WIDTH/2);
            }
            setControlsVisible(false);
        }, 180);
    }
};

// ─── UI ───
const UI = {
    // Start screen
    drawStart(ctx) {
        ctx.fillStyle='rgba(0,0,0,0.48)'; ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);

        // Draw player preview
        if (!useImageFallback) {
            ctx.save();
            ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=15;
            ctx.drawImage(images.player, GAME_WIDTH/2-40, GAME_HEIGHT/2-155, 80, 80);
            ctx.restore();
        }

        // Title
        ctx.save();
        ctx.textAlign='center';
        ctx.fillStyle='white'; ctx.font='bold 56px Quicksand, sans-serif';
        ctx.shadowColor='rgba(0,0,0,0.35)'; ctx.shadowBlur=8;
        ctx.fillText('BOUNCX', GAME_WIDTH/2, GAME_HEIGHT/2-40);
        ctx.shadowBlur=0;

        ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.font='bold 16px Quicksand, sans-serif';
        ctx.fillText('Bounce. Survive. Rise.', GAME_WIDTH/2, GAME_HEIGHT/2-5);

        // CTA button
        const pulse = 0.94+0.06*Math.sin(performance.now()/320);
        ctx.save();
        ctx.translate(GAME_WIDTH/2, GAME_HEIGHT/2+60); ctx.scale(pulse,pulse);
        ctx.fillStyle='#e8824a';
        this.roundRect(ctx,-85,-26,170,52,26); ctx.fill();
        ctx.fillStyle='white'; ctx.font='bold 22px Quicksand, sans-serif';
        ctx.fillText('TAP TO PLAY', 0, 9);
        ctx.restore();

        if (highScore>0) {
            ctx.fillStyle='#ffe066'; ctx.font='bold 16px Quicksand, sans-serif';
            ctx.fillText(`⭐  Best: ${highScore}`, GAME_WIDTH/2, GAME_HEIGHT/2+120);
        }
        ctx.restore();
    },

    // HUD during play
    drawHUD(ctx) {
        dispScore += (score - dispScore) * 0.15;
        const shown = Math.round(dispScore);

        ctx.save();
        ctx.textAlign='center';
        ctx.fillStyle='white'; ctx.font='bold 40px Quicksand, sans-serif';
        ctx.shadowColor='rgba(0,0,0,0.35)'; ctx.shadowBlur=6;
        ctx.fillText(shown, GAME_WIDTH/2, 72);
        ctx.restore();

        // Speed bar
        const pct = Math.min(1, score/65);
        ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(12,12,80,7);
        ctx.fillStyle=`hsl(${(1-pct)*100},70%,55%)`; ctx.fillRect(12,12,pct*80,7);
        ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.strokeRect(12,12,80,7);
        ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='10px Quicksand, sans-serif'; ctx.textAlign='left';
        ctx.fillText('SPEED', 14, 30);
    },

    // Dead screen
    drawDead(ctx) {
        ctx.fillStyle='rgba(0,0,0,0.58)'; ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
        ctx.save(); ctx.textAlign='center';

        // Panel
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5;
        this.roundRect(ctx,55,GAME_HEIGHT/2-130,290,260,18);
        ctx.fill(); ctx.stroke();

        ctx.fillStyle='#e05050'; ctx.font='bold 46px Quicksand, sans-serif';
        ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=6;
        ctx.fillText('GAME OVER', GAME_WIDTH/2, GAME_HEIGHT/2-75);
        ctx.shadowBlur=0;

        ctx.fillStyle='white'; ctx.font='bold 28px Quicksand, sans-serif';
        ctx.fillText(`Score: ${score}`, GAME_WIDTH/2, GAME_HEIGHT/2-25);

        if (isNewBest) {
            ctx.fillStyle='#FFD700'; ctx.font='bold 22px Quicksand, sans-serif';
            ctx.fillText('✨  NEW BEST!  ✨', GAME_WIDTH/2, GAME_HEIGHT/2+18);
        } else {
            ctx.fillStyle='#e8c840'; ctx.font='bold 18px Quicksand, sans-serif';
            ctx.fillText(`Best: ${highScore}`, GAME_WIDTH/2, GAME_HEIGHT/2+18);
        }

        // Restart button
        const pulse = 0.94+0.06*Math.sin(performance.now()/320);
        ctx.save();
        ctx.translate(GAME_WIDTH/2, GAME_HEIGHT/2+90); ctx.scale(pulse,pulse);
        ctx.fillStyle='#4a9e5c';
        this.roundRect(ctx,-80,-25,160,50,25); ctx.fill();
        ctx.fillStyle='white'; ctx.font='bold 22px Quicksand, sans-serif';
        ctx.fillText('PLAY AGAIN', 0, 9);
        ctx.restore();

        ctx.restore();
    },

    roundRect(ctx,x,y,w,h,r) {
        ctx.beginPath();
        ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
        ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
        ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
    }
};

// ─── MAIN LOOP ───
Clouds.init();

function loop(ts) {
    let dt = (ts-lastTime)/1000;
    if (isNaN(dt)||dt>0.1) dt=1/60;
    lastTime=ts;

    ctx.save();
    // Screen shake
    if (shakeAmt>0) {
        shakeAmt = Math.max(0, shakeAmt-dt*60);
        ctx.translate((Math.random()-0.5)*shakeAmt, (Math.random()-0.5)*shakeAmt);
    }

    // Background
    Clouds.draw(ctx);

    if (state===GS.PLAYING) {
        const spd = Math.min(130, 18 + score*1.5);   // fairer ramp, lower cap

        Player.update(dt);
        Platforms.update(dt, spd);
        Particles.update(dt);

        const hit = Collision.check();
        if (hit==='death') {
            RestartSystem.death();
        } else if (hit) {
            Player.vy = Player.jumpPower;
            Player.doSquish();
            score++;

            Particles.spawnBounce(Player.x, Player.y+Player.radius);
            Particles.spawnScore(Player.x, Player.y-Player.radius-8, '+1');

            if (hit.type==='normal') { SFX.bounce(); }
            else {
                hit.bounces--;
                SFX.weak();
                if (hit.bounces<=0) { Particles.spawnBreak(hit.x,hit.y,hit.w); hit.breakAnim=0.01; SFX.break(); }
            }

            // Poki ad every 15 points
            if (score-lastAdAt>=15) {
                lastAdAt=score;
                PokiSDK.commercialBreak(()=>{ lastTime=performance.now(); });
            }
        }
    } else if (state===GS.FREEZE) {
        Particles.update(dt);
    }

    Platforms.draw(ctx);
    DangerZone.draw(ctx);
    if (state!==GS.DEAD && state!==GS.FREEZE) Player.draw(ctx);
    Particles.draw(ctx);

    ctx.restore();

    // Overlays (no shake)
    if (state===GS.PLAYING||state===GS.FREEZE||state===GS.PAUSED) UI.drawHUD(ctx);
    if (state===GS.START) UI.drawStart(ctx);
    if (state===GS.DEAD)  UI.drawDead(ctx);

    requestAnimationFrame(loop);
}
</script>
